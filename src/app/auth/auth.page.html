<ion-content class="auth-content" [fullscreen]="true">
  <div class="background-overlay"></div>
  <div class="auth-wrapper">
    <!-- Header Section with Motivation -->
    <div class="header-section">
      <div class="icon-container">
        <ion-icon name="wallet-outline"></ion-icon>
      </div>
      <h1 class="sparkle-text">Tự Do Tài Chính</h1>
      <p class="motivation-text">"Kỷ luật từng đồng hôm nay<br/>Sẵn sàng cho tương lai ngày mai"</p>
    </div>

    <!-- Glassmorphism Login Card -->
    <div class="glass-card">
      <h2 class="card-title">Xác thực quyền truy cập</h2>
      
      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input
          type="password"
          [(ngModel)]="password"
          (keyup.enter)="verifyPassword()"
          placeholder="Nhập mã bí mật..."
          maxlength="10"
        ></ion-input>
      </div>

      <ion-button expand="block" shape="round" class="login-btn" (click)="verifyPassword()">
        Mở Hộp Tiết Kiệm
        <ion-icon slot="end" name="key-outline"></ion-icon>
      </ion-button>
    </div>
    
    <!-- Footer Target -->
    <div class="footer-text">
      🎯 Vì mục tiêu 70 triệu cuối năm!
    </div>
  </div>
</ion-content>
